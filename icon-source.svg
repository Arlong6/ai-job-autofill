  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="#4f46e5"/>
  <!-- Subtle highlight -->
  <rect x="16" y="16" width="480" height="240" rx="96" ry="96" fill="#6366f1" opacity="0.5"/>

  <!-- Document shape -->
  <path d="M152 80 L312 80 L368 136 L368 432 L152 432 Z" fill="white"/>
  <!-- Document fold -->
  <path d="M312 80 L312 136 L368 136 Z" fill="#c7d2fe"/>

  <!-- Text lines on document -->
  <rect x="188" y="172" width="148" height="14" rx="7" fill="#a5b4fc"/>
  <rect x="188" y="204" width="120" height="14" rx="7" fill="#c7d2fe"/>
  <rect x="188" y="236" width="140" height="14" rx="7" fill="#c7d2fe"/>
  <rect x="188" y="268" width="104" height="14" rx="7" fill="#ddd6fe"/>

  <!-- Lightning bolt / autofill -->
  <g transform="translate(292, 328)">
    <path d="M-10 -52 L18 -6 L2 -6 L10 52 L-18 6 L-2 6 Z" fill="#fbbf24"/>
  </g>

  <!-- Green checkmark circle -->
